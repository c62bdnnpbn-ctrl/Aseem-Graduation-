<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #faf9f6;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
        }

        .card {
            background: #ffffff;
            padding: 50px;
            text-align: center;
            max-width: 450px;
            border-bottom: 6px solid #d4af37;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border-radius: 5px;
            position: relative;
            z-index: 1;
        }

        .cap-icon { font-size: 60px; margin-bottom: 20px; }
        h1 { color: #4a4a4a; font-size: 24px; margin-bottom: 20px; }
        p { color: #7a7a7a; font-size: 18px; line-height: 1.8; margin-bottom: 40px; }

        .btn-box {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        button {
            padding: 12px 35px;
            font-size: 18px;
            border: 1px solid #d4af37;
            background: #ffffff;
            color: #d4af37;
            cursor: pointer;
            font-weight: bold;
        }

        #yesBtn:hover { background: #d4af37; color: white; }
        
        /* هذا هو السر: الزر يتحول لـ fixed فقط لما يهرب */
        #noBtn {
            transition: all 0.1s ease;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="cap-icon">🎓</div>
    <h1>الحمدلله الذي يسر البدايات وأتم النهايات وبلغنا الغايات</h1>
    <p>يسعدني ويشرفني دعوتكم لحضور حفل تخرجي وذلك بمشيئة الله تعالى بيوم 17 يونيو..<br>هل تقبلين الدعوة ؟</p>
    
    <div class="btn-box">
        <button id="yesBtn" onclick="alert('سعدت بقبولك الدعوة! بانتظارك ❤️')">أكيييد</button>
        <button id="noBtn" onmouseenter="runAway()">لا</button>
    </div>
</div>

<script>
    function runAway() {
        const btn = document.getElementById('noBtn');
        
        // تغيير وضعية الزر ليكون حراً في الصفحة
        btn.style.position = 'fixed';
        
        // توزيع عشوائي في كامل مساحة الشاشة
        const newX = Math.random() * (window.innerWidth - 100);
        const newY = Math.random() * (window.innerHeight - 50);
        
        btn.style.left = newX + 'px';
        btn.style.top = newY + 'px';
    }
</script>

</body>
</html>
